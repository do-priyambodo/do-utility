<h3>
  <code>Contains</code>
</h3>
<table>
  <tbody class="list">
  <tr>
    <th width="20%">Syntax</th>
    <td>
      <pre class="prettyprint lang-html notranslate" translate="no">
        
contains(arr, elem)
      </pre>
    </td>
  </tr>
  <tr>
    <th width="20%">Description</th>
    <td>Checks the occurrence of the specified element in an array.
    </td>
  </tr>
  <tr>
    <th width="20%">Input parameter</th>
    <td><b>arr:</b> The input array.
      <p><b>elem:</b> The array element to search.</p>
    </td>
  </tr>
  <tr>
    <th width="20%">Return type</th>
    <td><code>BOOLEAN</code>
    </td>
  </tr>
  <tr>
    <th width="20%">Output</th>
    <td>Returns <b>TRUE</b> if a match is found and <b>FALSE</b> otherwise.
    </td>
  </tr>
</tbody>
</table>
