<h3>
  <code>Sum</code> 
</h3>
<table>
  <tbody class="list">
  <tr>
    <th width="20%">Syntax</th>
    <td>
      <pre class="prettyprint lang-html notranslate" translate="no">
        
sum(arr)
      </pre>
    </td>
  </tr>
  <tr>
    <th width="20%">Description</th>
    <td>Adds all the values in an array.
    </td>
  </tr>
  <tr>
    <th width="20%">Input parameter</th>
    <td><b>arr:</b> The input array.
    </td>
  </tr>
  <tr>
    <th width="20%">Return type</th>
    <td>The data type of the input array.
    </td>
  </tr>
  <tr>
    <th width="20%">Output</th>
    <td>Returns the sum of all the elements in the array. 
    </td>
  </tr>
</tbody>
</table>
