<h3>
  <code>Is Null</code>
</h3>
<table>
  <tbody class="list">
  <tr>
    <th width="20%">Syntax</th>
    <td>
      <pre class="prettyprint lang-html notranslate" translate="no">
isNull(value)
      </pre>
    </td>
  </tr>
  <tr>
    <th width="20%">Description</th>
    <td> Checks if the given value is null and returns a boolean indicating the result.
    </td>
  </tr>
  <tr>
    <th width="20%">Input parameter</th>
    <td> <b>value:</b> The input value of any data type to be checked for null.
    </td>
  </tr>
  <tr>
    <th width="20%">Return type</th>
    <td><code>BOOLEAN</code>
    </td>
  </tr>
  <tr>
    <th width="20%">Output</th>
    <td> Returns <code>true</code> if the value is null; otherwise, returns <code>false</code>.
    </td>
  </tr>
</tbody>
</table>
