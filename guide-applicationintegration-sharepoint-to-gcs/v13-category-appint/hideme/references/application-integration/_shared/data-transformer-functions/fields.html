<h3>
  <code>Object Fields</code>
</h3>
<table>
  <tbody class="list">
  <tr>
    <th width="20%">Syntax</th>
    <td>
      <pre class="prettyprint lang-html notranslate" translate="no">
objectFields(object)
      </pre>
    </td>
  </tr>
  <tr>
    <th width="20%">Description</th>
    <td>Extracts the names of all fields from an object.
    </td>
  </tr>
  <tr>
    <th width="20%">Input parameter</th>
    <td><b>object:</b> The input JSON object.
    </td>
  </tr>
  <tr>
    <th width="20%">Return type</th>
    <td><code>ARRAY</code>
    </td>
  </tr>
  <tr>
    <th width="20%">Output</th>
    <td>Returns an array containing the names of all fields specified in the input object.
    </td>
  </tr>
</tbody>
</table>
