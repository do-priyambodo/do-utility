<h3>
  <code>Remove</code> 
</h3>
<table>
  <tbody class="list">
  <tr>
    <th width="20%">Syntax</th>
    <td>
      <pre class="prettyprint lang-html notranslate" translate="no">
        
remove(arr, elem)
      </pre>
    </td>
  </tr>
  <tr>
    <th width="20%">Description</th>
    <td>Removes the specified element from an array.
    </td>
  </tr>
  <tr>
    <th width="20%">Input parameter</th>
    <td><b>arr:</b> The input array.
      <p><b>elem:</b> The array element to remove.</p>
    </td>
  </tr>
  <tr>
    <th width="20%">Return type</th>
    <td>The data type of the input array.
    </td>
  </tr>
  <tr>
    <th width="20%">Output</th>
    <td>Returns the updated array after removing the specified element.
    </td>
  </tr>
</tbody>
</table>
