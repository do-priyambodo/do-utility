<h3>
  <code>Is Odd</code> 
</h3>
<table>
  <tbody class="list">
  <tr>
    <th width="20%">Syntax</th>
    <td>
      <pre class="prettyprint lang-html notranslate" translate="no">
        
isOdd(num)
      </pre>
    </td>
  </tr>
  <tr>
    <th width="20%">Description</th>
    <td>Checks if the given number is odd.
    </td>
  </tr>
  <tr>
    <th width="20%">Input parameter</th>
    <td><b>num:</b> The input number.
    </td>
  </tr>
  <tr>
    <th width="20%">Return type</th>
    <td><code>BOOLEAN</code>
    </td>
  </tr>
  <tr>
    <th width="20%">Output</th>
    <td>Returns <b>TRUE</b> if the number is odd and <b>FALSE</b> otherwise.
    </td>
  </tr>
</tbody>
</table>
