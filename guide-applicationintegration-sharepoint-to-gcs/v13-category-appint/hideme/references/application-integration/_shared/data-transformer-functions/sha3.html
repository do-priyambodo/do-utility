<h3>
  <code>SHA3</code> 
</h3>
<table>
  <tbody class="list">
  <tr>
    <th width="20%">Syntax</th>
    <td>
      <pre class="prettyprint lang-html notranslate" translate="no">
        
sha3(str)
      </pre>
    </td>
  </tr>
  <tr>
    <th width="20%">Description</th>
    <td>Computes the cryptographic hash of the input <code>STRING</code> using the <a href="https://en.wikipedia.org/wiki/SHA-3">Secure Hash Algorithm 3 (SHA-3)</a> algorithm. 
    </td>
  </tr>
  <tr>
    <th width="20%">Input parameter</th>
    <td><b>str:</b> The input string.
    </td>
  </tr>
  <tr>
    <th width="20%">Return type</th>
    <td><code>BYTES</code>
    </td>
  </tr>
  <tr>
    <th width="20%">Output</th>
    <td>Returns a 512 bit (64-byte) hash value.
    </td>
  </tr>
</tbody>
</table>
