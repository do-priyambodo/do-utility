<h2>Pricing</h2>
<p>The {{apip_trigger_pubsub}} and {{apip_trigger_salescdc}} don't require you to create a <a href="/integration-connectors/docs/all-integration-connectors">connector</a>. However, if you use the <a href="/application-integration/docs/configure-connectors-task">Connectors task</a> to connect to {{pubsub_name}} or Salesforce, then you are billed for the connector usage. For information about pricing, see <a href="/application-integration/docs/pricing">{{integration}} pricing</a>.</p>
