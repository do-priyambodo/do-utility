<h3>
  <code>Average</code>
</h3>
<table>
  <tbody class="list">
  <tr>
    <th width="20%">Syntax</th>
    <td>
      <pre class="prettyprint lang-html notranslate" translate="no">
avg(arr)
      </pre>
    </td>
  </tr>
  <tr>
    <th width="20%">Description</th>
    <td>Calculates the numerical average of all the values in an array.
    </td>
  </tr>
  <tr>
    <th width="20%">Input parameter</th>
    <td><b>arr:</b> The input array.
    </td>
  </tr>
  <tr>
    <th width="20%">Return type</th>
    <td><code>DOUBLE</code>
    </td>
  </tr>
  <tr>
    <th width="20%">Output</th>
    <td>Returns the average of all the values in the array.
    </td>
  </tr>
</tbody>
</table>
