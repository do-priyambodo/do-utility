<h3>
  <code>Is Leap Year</code> 
</h3>
<table>
  <tbody class="list">
  <tr>
    <th width="20%">Syntax</th>
    <td>
      <pre class="prettyprint lang-html notranslate" translate="no">
        
isLeapYear(year)
      </pre>
    </td>
  </tr>
  <tr>
    <th width="20%">Description</th>
    <td>Checks if the given year is a leap year.
    </td>
  </tr>
  <tr>
    <th width="20%">Input parameter</th>
    <td><b>year:</b> The input year (real number).
    </td>
  </tr>
  <tr>
    <th width="20%">Return type</th>
    <td><code>BOOLEAN</code>
    </td>
  </tr>
  <tr>
    <th width="20%">Output</th>
    <td>Returns <b>TRUE</b> if the year is a leap year and <b>FALSE</b> otherwise.
    </td>
  </tr>
</tbody>
</table>
