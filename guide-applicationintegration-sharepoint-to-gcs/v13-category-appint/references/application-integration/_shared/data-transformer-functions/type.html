<h3>
  <code>Type</code>
</h3>
<table>
  <tbody class="list">
  <tr>
    <th width="20%">Syntax</th>
    <td>
      <pre class="prettyprint lang-html notranslate" translate="no">
type(value)
      </pre>
    </td>
  </tr>
  <tr>
    <th width="20%">Description</th>
    <td>Identifies the data type of the input value.
    </td>
  </tr>
  <tr>
    <th width="20%">Input parameter</th>
    <td><b>value:</b> The input value. This can be a string, boolean, integer, object, or function.
    </td>
  </tr>
  <tr>
    <th width="20%">Return type</th>
    <td><code>STRING</code>
    </td>
  </tr>
  <tr>
    <th width="20%">Output</th>
    <td>Returns a string indicating the data type of the input value.
    </td>
  </tr>
</tbody>
</table>
