<h3>
  <code>Round</code> 
</h3>
<table>
  <tbody class="list">
  <tr>
    <th width="20%">Syntax</th>
    <td>
      <pre class="prettyprint lang-html notranslate" translate="no">
        
round(input)
      </pre>
    </td>
  </tr>
  <tr>
    <th width="20%">Description</th>
    <td>Rounds off a number to the nearest integer.
    </td>
  </tr>
  <tr>
    <th width="20%">Input parameter</th>
    <td><b>input:</b> A value to round off.
    </td>
  </tr>
  <tr>
    <th width="20%">Return type</th>
    <td><code>INTEGER</code>
    </td>
  </tr>
  <tr>
    <th width="20%">Return value</th>
    <td>Returns the nearest rounded off integer. 
    </td>
  </tr>
</tbody>
</table>
