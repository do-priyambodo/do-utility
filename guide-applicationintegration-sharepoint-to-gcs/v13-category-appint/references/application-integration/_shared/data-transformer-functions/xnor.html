<h3>
  <code>XNOR</code> 
</h3>
<table>
  <tbody class="list">
  <tr>
    <th width="20%">Syntax</th>
    <td>
      <pre class="prettyprint lang-html notranslate" translate="no">
        
xnor(a, b)
      </pre>
    </td>
  </tr>
  <tr>
    <th width="20%">Description</th>
    <td>Performs a logical XNOR operation on the specified boolean values.
    </td>
  </tr>
  <tr>
    <th width="20%">Input parameter</th>
    <td><b>a:</b> A boolean value.
      <p><b>b:</b> A boolean value.</p>
    </td>
  </tr>
  <tr>
    <th width="20%">Return type</th>
    <td><code>BOOLEAN</code>
    </td>
  </tr>
  <tr>
    <th width="20%">Output</th>
    <td>Returns the XNOR of the two given booleans.
    </td>
  </tr>
</tbody>
</table>
