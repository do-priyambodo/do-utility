<h3>
  <code>Object Values</code>
</h3>
<table>
  <tbody class="list">
  <tr>
    <th width="20%">Syntax</th>
    <td>
      <pre class="prettyprint lang-html notranslate" translate="no">
objectValues(object)
      </pre>
    </td>
  </tr>
  <tr>
    <th width="20%">Description</th>
    <td>Extracts the values of all fields from an object.
    </td>
  </tr>
  <tr>
    <th width="20%">Input parameter</th>
   <td><b>object:</b> The input JSON object.</li>
    </td>
  </tr>
  <tr>
    <th width="20%">Return type</th>
  <td><code>ARRAY</code>
    </td>
  </tr>
  <tr>
    <th width="20%">Output</th>
    <td>Returns an array containing all the values of fields specified in the input object.
    </td>
  </tr>
</tbody>
</table>
