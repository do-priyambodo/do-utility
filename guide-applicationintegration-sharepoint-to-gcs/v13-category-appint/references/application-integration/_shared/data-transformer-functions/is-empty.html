<h3>
  <code>Is Empty</code> 
</h3>
<table>
  <tbody class="list">
  <tr>
    <th width="20%">Syntax</th>
    <td>
      <pre class="prettyprint lang-html notranslate" translate="no">
        
isEmpty(str)
      </pre>
    </td>
  </tr>
  <tr>
    <th width="20%">Description</th>
    <td>Checks if the length of the given string is 0.
    </td>
  </tr>
  <tr>
    <th width="20%">Input parameter</th>
    <td><b>str:</b> The input string.
    </td>
  </tr>
  <tr>
    <th width="20%">Return type</th>
    <td><code>BOOLEAN</code>
    </td>
  </tr>
  <tr>
    <th width="20%">Output</th>
    <td>Returns <b>TRUE</b> if the string is empty and <b>FALSE</b> otherwise.
    </td>
  </tr>
</tbody>
</table>
