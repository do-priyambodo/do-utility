<h3>
  <code>Trim</code> 
</h3>
<table>
  <tbody class="list">
  <tr>
    <th width="20%">Syntax</th>
    <td>
      <pre class="prettyprint lang-html notranslate" translate="no">
        
trim(str)
      </pre>
    </td>
  </tr>
  <tr>
    <th width="20%">Description</th>
    <td>Removes all the leading and trailing spaces of a given string.
    </td>
  </tr>
  <tr>
    <th width="20%">Input parameter</th>
    <td><b>str:</b> The input string.
    </td>
  </tr>
  <tr>
    <th width="20%">Return type</th>
    <td><code>STRING</code>
    </td>
  </tr>
  <tr>
    <th width="20%">Output</th>
    <td>Returns a copy of the string, with leading and trailing whitespace removed.
    </td>
  </tr>
</tbody>
</table>
