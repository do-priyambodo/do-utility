<h2>Error handling strategy</h2>

<p>
  An error handling strategy for a task specifies the action to take if the task fails due to a <a href="{{basehrefpath}}/error-handling">temporary error</a>. For information about how to use an error handling strategy, and to know about the different types of error handling strategies, see <a href="{{basehrefpath}}/error-handling-strategy">Error handling strategies</a>.
</p>
